<svg fill="none" viewBox="0 0 800 220" width="800" height="220" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .wrap {
          width: 800px;
          height: 220px;
          background: #161b22;
          border-radius: 12px;
          border: 1px solid #30363d;
          overflow: hidden;
        }
        .bar {
          background: #21262d;
          padding: 10px 16px;
          display: flex;
          align-items: center;
          gap: 6px;
          border-bottom: 1px solid #30363d;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .r { background: #ff5f56; }
        .y { background: #ffbd2e; }
        .g { background: #27c93f; }
        .title { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #484f58; margin-left: auto; }
        .body { padding: 18px 24px; }
        .line { font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 2.1; white-space: nowrap; }
        .prompt { color: #27c93f; }
        .key { color: #e3b341; }
        .val { color: #e6edf3; }
        .dim { color: #7d8590; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        .cursor { display: inline-block; width: 8px; height: 14px; background: #e6edf3; vertical-align: middle; animation: blink 1.1s step-end infinite; }
      </style>
      <div class="wrap">
        <div class="bar">
          <div class="dot r"></div>
          <div class="dot y"></div>
          <div class="dot g"></div>
          <div class="title">about.sh</div>
        </div>
        <div class="body">
          <div class="line"><span class="prompt">~$</span> <span class="dim">cat about.txt</span></div>
          <div class="line"><span class="key">name</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="val">Vishwaa Shah</span></div>
          <div class="line"><span class="key">degree</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="val">M.S. Computer Science (in progress)</span></div>
          <div class="line"><span class="key">experience</span>&nbsp;&nbsp;<span class="val">Software Developer Intern @ Palm Infotech (Spring 2025)</span></div>
          <div class="line"><span class="key">looking_for</span>&nbsp;<span class="val">SWE · AI Engineer · Software Dev roles</span></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
